<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Presentation Practice</title>

<style>
body { font-family: Arial; padding:20px; }

h2 { text-align:center }

.controls { margin-bottom:15px }

button { padding:8px 12px; margin-right:5px }

.line {
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  background:#f5f6fa;
}

.en { font-weight:bold; }
.vi { color:#636e72; font-size:14px; margin-top:4px; }

.active {
  background:#ffeaa7;
  transform:scale(1.02);
  transition:0.2s;
}
</style>
</head>

<body>

<h2>📊 Presentation English (Shadowing PRO)</h2>

<div class="controls">
  <button onclick="play()">▶ Play</button>
  <button onclick="pause()">⏸ Pause</button>
  <button onclick="resume()">▶ Resume</button>
  <button onclick="stop()">⏹ Stop</button>

  Speed:
  <input type="range" id="speed" min="0.2" max="1.2" step="0.1" value="0.5">
  <span id="speedVal">0.7</span>
</div>

<div id="container"></div>

<script>

// ===== SPEED =====
const speedSlider = document.getElementById("speed");
const speedVal = document.getElementById("speedVal");
speedSlider.oninput = ()=> speedVal.innerText = speedSlider.value;
function rate(){ return parseFloat(speedSlider.value); }

// ===== DATA (20 câu PRO) =====
const sentences = [

["Good morning everyone, and thank you for your time today.","Chào buổi sáng mọi người, cảm ơn mọi người đã dành thời gian hôm nay."],
["My name is …, an engineer from the ePT Mechanical System Development Team.","Tôi tên là …, kỹ sư thuộc nhóm Phát triển Hệ thống Cơ khí ePT."],
["On behalf of our team, I would like to present the BPE activity outcomes from last year.","Thay mặt nhóm, tôi xin trình bày kết quả hoạt động BPE của năm vừa rồi."],
["Let me begin my presentation.","Tôi xin bắt đầu bài thuyết trình."],

["As shown on the screen, the theme we selected is this.","Như thể hiện trên màn hình, đây là chủ đề mà chúng tôi đã chọn."],
["Use a Drawing Management Sheet to prevent omissions and shorten checking time during design changes.","Sử dụng bảng quản lý bản vẽ để tránh bỏ sót và rút ngắn thời gian kiểm tra khi thay đổi thiết kế."],
["We are a team of five members, including Tsuchino‑san.","Chúng tôi là nhóm gồm năm thành viên, bao gồm cả Tsuchino‑san."],
["I have been the team leader.","Tôi là người đảm nhiệm vai trò trưởng nhóm."],

["This is today’s agenda.","Đây là nội dung chính của buổi hôm nay."],
["First, I will explain the background behind choosing this theme.","Đầu tiên, tôi sẽ giải thích lý do chọn chủ đề này."],
["Next, I will clarify the problem and activity plan.","Tiếp theo, tôi sẽ làm rõ vấn đề và kế hoạch hoạt động."],
["Finally, I will give a summary.","Cuối cùng, tôi sẽ đưa ra phần tổng kết."],

["This slide provides the background for why we selected this theme.","Slide này cho thấy lý do vì sao chúng tôi chọn chủ đề này."],
["ePT products have many variations and components.","Sản phẩm ePT có rất nhiều biến thể và linh kiện."],
["It takes a long time to check all affected objects during a design change.","Việc kiểm tra tất cả các đối tượng bị ảnh hưởng khi thay đổi thiết kế mất rất nhiều thời gian."],

["It is required to add a new sheet for multi‑sheet drawings.","Cần phải thêm sheet mới cho các bản vẽ nhiều trang."],
["We need to convert old TIFF drawings into CATIA or Creo formats.","Chúng tôi phải chuyển đổi bản vẽ TIFF cũ sang định dạng CATIA hoặc Creo."],
["We must create multi‑drawings when changing gear ratio or adding new SHIM thickness.","Khi thay đổi tỉ số truyền hoặc thêm độ dày SHIM, chúng tôi phải tạo bản vẽ mới."],

["In a normal case, both the 3D model and the 2D drawing need to be revised.","Trong trường hợp bình thường, cả mô hình 3D và bản vẽ 2D đều phải được sửa."],
["For adding new sheets or converting TIFF drawings, we create new objects instead of revising existing ones.","Khi thêm sheet mới hoặc chuyển đổi TIFF, chúng tôi tạo đối tượng mới thay vì sửa đối tượng cũ."],
["For gear‑ratio changes or new SHIM thickness, we create a new 3D model while only revising the 2D drawing.","Khi thay đổi tỉ số truyền hoặc thêm SHIM, chúng tôi tạo mô hình 3D mới và chỉ sửa bản vẽ 2D."],

["The system only lists affected objects vertically.","Hệ thống chỉ liệt kê các đối tượng bị ảnh hưởng theo chiều dọc."],
["There is no horizontal sorting or old‑to‑new comparison.","Không có sắp xếp theo chiều ngang hoặc so sánh giữa bản cũ và bản mới."],
["Checking for missing items takes a lot of time.","Việc kiểm tra xem có thiếu sót hay không mất rất nhiều thời gian."],

["We focused our analysis on three key points.","Chúng tôi tập trung phân tích vào ba điểm chính."],
["The current problem is that checking ECA information takes too much time.","Vấn đề hiện tại là việc kiểm tra thông tin ECA mất quá nhiều thời gian."],
["Our ideal condition is to check all affected objects without spending time.","Điều kiện lý tưởng là có thể kiểm tra tất cả đối tượng mà không tốn thời gian."]

];


// ===== VOICE PRO (fix iPhone) =====
let usVoice = null;
let voicesLoaded = false;

function loadVoices(){
  const voices = speechSynthesis.getVoices();
  if(!voices.length) return;

  usVoice =
    voices.find(v => v.name.includes("Google US English")) ||
    voices.find(v => v.name.includes("Samantha")) ||
    voices.find(v => v.lang === "en-US") ||
    voices.find(v => v.lang.includes("en"));

  voicesLoaded = true;

  console.log("Voice:", usVoice?.name);
}

speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 300);
setTimeout(loadVoices, 1000);

// ===== RENDER =====
const container = document.getElementById("container");
let allLines = [];

sentences.forEach((s, i)=>{
  const div = document.createElement("div");
  div.className = "line";
  div.id = "line-" + i;

  div.innerHTML = `
    <div class="en">${s[0]}</div>
    <div class="vi">${s[1]}</div>
  `;

  container.appendChild(div);

  allLines.push({
    id: div.id,
    text: s[0]
  });
});

// ===== SPEAK =====
function speakAsync(text){
  return new Promise(resolve=>{

    const speakNow = ()=>{
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = rate();

      if(usVoice){
        u.voice = usVoice;
      }

      u.onend = ()=> setTimeout(resolve, 400);

      speechSynthesis.speak(u);
    };

    if(!voicesLoaded){
      setTimeout(speakNow, 300);
    } else {
      speakNow();
    }

  });
}

// ===== CONTROL =====
let index = 0;
let isPlaying = false;
let isPaused = false;

async function play(){
  stop();
  isPlaying = true;
  index = 0;

  while(index < allLines.length && isPlaying){

    while(isPaused){
      await new Promise(r=>setTimeout(r,200));
    }

    highlight(index);

    await speakAsync(allLines[index].text);

    index++;
  }

  clearHighlight();
}

function pause(){
  isPaused = true;
  speechSynthesis.pause();
}

function resume(){
  isPaused = false;
  speechSynthesis.resume();
}

function stop(){
  isPlaying = false;
  isPaused = false;
  speechSynthesis.cancel();
  clearHighlight();
}

// ===== UI =====
function highlight(i){
  clearHighlight();

  const el = document.getElementById(allLines[i].id);
  if(!el) return;

  el.classList.add("active");

  el.scrollIntoView({
    behavior:"smooth",
    block:"center"
  });
}

function clearHighlight(){
  document.querySelectorAll(".line").forEach(el=>{
    el.classList.remove("active");
  });
}

</script>

</body>
</html>

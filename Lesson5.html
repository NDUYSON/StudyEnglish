  <button onclick="stop()">⏹ Stop</button>

const speedVal = document.getElementById("speedVal");
speedSlider.oninput = ()=> speedVal.innerText = speedSlider.value;
function rate(){ return parseFloat(speedSlider.value); }

// ===== VOICE PRO (fix iPhone) =====
let usVoice = null;
let voicesLoaded = false;

function loadVoices(){
  const voices = speechSynthesis.getVoices();
  if(!voices.length) return;

  usVoice =
    voices.find(v => v.name.includes("Google US English")) ||
    voices.find(v => v.name.includes("Samantha")) ||
    voices.find(v => v.lang === "en-US") ||
    voices.find(v => v.lang.includes("en"));

  voicesLoaded = true;

  console.log("Voice:", usVoice?.name);
}

speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 300);
setTimeout(loadVoices, 1000);

// ===== RENDER =====
const container = document.getElementById("container");
let allLines = [];

sentences.forEach((s, i)=>{
  const div = document.createElement("div");
  div.className = "line";
  div.id = "line-" + i;

  div.innerHTML = `
    <div class="en">${s[0]}</div>
    <div class="vi">${s[1]}</div>
  `;

  container.appendChild(div);

  allLines.push({
    id: div.id,
    text: s[0]
  });
});

// ===== SPEAK =====
function speakAsync(text){
  return new Promise(resolve=>{

    const speakNow = ()=>{
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = rate();

      if(usVoice){
        u.voice = usVoice;
      }

      u.onend = ()=> setTimeout(resolve, 400);

      speechSynthesis.speak(u);
    };

    if(!voicesLoaded){
      setTimeout(speakNow, 300);
    } else {
      speakNow();
    }

  });
}

// ===== CONTROL =====
let index = 0;
let isPlaying = false;
let isPaused = false;

async function play(){
  stop();
  isPlaying = true;
  index = 0;

  while(index < allLines.length && isPlaying){

    while(isPaused){
      await new Promise(r=>setTimeout(r,200));
    }

    highlight(index);

    await speakAsync(allLines[index].text);

    index++;
  }

  clearHighlight();
}

function pause(){
  isPaused = true;
  speechSynthesis.pause();
}

function resume(){
  isPaused = false;
  speechSynthesis.resume();
}

function stop(){
  isPlaying = false;
  isPaused = false;
  speechSynthesis.cancel();
  clearHighlight();
}

// ===== UI =====
function highlight(i){
  clearHighlight();

  const el = document.getElementById(allLines[i].id);
  if(!el) return;

  el.classList.add("active");

  el.scrollIntoView({
    behavior:"smooth",
    block:"center"
  });
}

function clearHighlight(){
  document.querySelectorAll(".line").forEach(el=>{
    el.classList.remove("active");
  });
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 2 - Conversation Practice</title>

<style>
body { font-family: Arial; padding: 20px; background:#f5f6fa;}
.container { max-width: 700px; margin: auto; }

.card {
  background: white;
  border-radius: 15px;
  padding: 25px;
  margin-top: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.question {
  font-size: 22px;
  font-weight: bold;
}

.answer {
  margin-top: 15px;
  color: green;
  display: none;
  font-size: 18px;
}

.controls {
  margin-top:20px;
}

.controls button {
  margin-right: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  background:#0984e3;
  color:white;
  cursor:pointer;
}

.controls button:hover {
  background:#74b9ff;
}

.countdown {
  font-size: 35px;
  color: red;
  margin-top: 10px;
  font-weight: bold;
}

.status {
  margin-top:10px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">
  <h2>🗣 Lesson 2: Daily Conversation</h2>

  <div class="card">
    <div id="question" class="question">Press Start</div>
    <div id="countdown" class="countdown"></div>
    <div id="status" class="status"></div>
    <div id="answer" class="answer"></div>
  </div>

  <div class="controls">
    <button onclick="startConversation()">▶ Start</button>
    <button onclick="showAnswer()">👁 Show Answer</button>
    <button onclick="repeatQuestion()">🔊 Repeat</button>
    <button onclick="nextQuestion()">➡ Next</button>
  </div>
</div>

<script>

const conversations = [
  { q: "What time do you wake up?", a: "I wake up at 6 a.m." },
  { q: "What do you do in the morning?", a: "I brush my teeth and have breakfast." },
  { q: "Do you drink coffee?", a: "Yes, I drink coffee every morning." },
  { q: "What time do you go to work?", a: "I go to work at 8 a.m." },
  { q: "What do you do after work?", a: "I go home and cook dinner." },
  { q: "What do you do at night?", a: "I watch TV and go to bed." },

  { q: "Do you take a shower in the morning?", a: "Yes, I take a shower every morning." },
  { q: "Do you eat breakfast every day?", a: "Yes, I eat breakfast every day." },
  { q: "What do you eat for breakfast?", a: "I eat bread and drink coffee." },
  { q: "Do you check your phone in the morning?", a: "Yes, I check my phone." },

  { q: "How do you go to work?", a: "I go to work by car." },
  { q: "Do you like your job?", a: "Yes, I like my job." },
  { q: "What do you do at work?", a: "I work on a computer." },
  { q: "Do you have lunch at work?", a: "Yes, I have lunch at work." },
  { q: "What time do you have lunch?", a: "I have lunch at 12 p.m." },

  { q: "Do you take a break at work?", a: "Yes, I take a break in the afternoon." },
  { q: "What time do you finish work?", a: "I finish work at 5 p.m." },
  { q: "Do you feel tired after work?", a: "Yes, I feel tired." },

  { q: "What do you do in the evening?", a: "I cook dinner and relax." },
  { q: "Do you watch TV every day?", a: "Yes, I watch TV every day." },
  { q: "Do you use your phone at night?", a: "Yes, I use my phone." },
  { q: "Do you read books?", a: "Yes, I read books sometimes." },

  { q: "What time do you go to bed?", a: "I go to bed at 10 p.m." },
  { q: "Do you sleep early?", a: "Yes, I sleep early." },
  { q: "Do you have a busy day?", a: "Yes, I have a busy day." }
];

let current = 0;
let timer;

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 1;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function startConversation() {
  current = 0;
  loadQuestion();
}

function loadQuestion() {
  clearInterval(timer);

  document.getElementById("answer").style.display = "none";
  document.getElementById("answer").innerText = conversations[current].a;

  document.getElementById("question").innerText = conversations[current].q;

  document.getElementById("status").innerText = "Listen carefully...";
  speak(conversations[current].q);

  startCountdown(3);
}

function startCountdown(sec) {
  let time = sec;
  const cd = document.getElementById("countdown");

  cd.innerText = time;

  timer = setInterval(() => {
    time--;
    cd.innerText = time;

    if (time <= 0) {
      clearInterval(timer);
      cd.innerText = "🎤 Speak now!";
      document.getElementById("status").innerText = "👉 Say your answer!";
    }
  }, 1000);
}

function showAnswer() {
  const ans = document.getElementById("answer");
  ans.style.display = "block";

  document.getElementById("status").innerText = "Check and repeat";

  speak(ans.innerText);
}

function repeatQuestion() {
  speak(conversations[current].q);
}

function nextQuestion() {
  current++;

  if (current >= conversations.length) {
    document.getElementById("question").innerText = "🎉 Done!";
    document.getElementById("countdown").innerText = "";
    document.getElementById("status").innerText = "Great job!";
    return;
  }

  loadQuestion();
}

</script>

</body>
</html>

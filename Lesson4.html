<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Appointment Dialog Practice</title>

<style>
body { font-family: Arial; padding:20px; }
h2 { text-align:center }
.controls { margin-bottom:15px }
button { padding:8px 12px; margin-right:5px }

.dialog {
  margin-bottom:20px;
  padding:10px;
  border-radius:10px;
  background:#f5f6fa;
}

.line { padding:6px; border-radius:6px; }
.A { color:#0984e3; }
.B { color:#d63031; }

.active {
  background:#ffeaa7;
  transform:scale(1.02);
}
</style>
</head>

<body>

<h2>🗣️ Daily Appointment Dialog</h2>

<div class="controls">
  <button onclick="play()">▶ Play</button>
  <button onclick="pause()">⏸ Pause</button>
  <button onclick="resume()">▶ Resume</button>
  <button onclick="stop()">⏹ Stop</button>

  Speed:
  <input type="range" id="speed" min="0.2" max="1.2" step="0.1" value="0.5">
  <span id="speedVal">0.7</span>
</div>

<div id="container"></div>

<script>

// ===== SPEED =====
const speedSlider = document.getElementById("speed");
const speedVal = document.getElementById("speedVal");
speedSlider.oninput = ()=> speedVal.innerText = speedSlider.value;
function rate(){ return parseFloat(speedSlider.value); }

// ===== VOICE PRO =====
let usVoice=null, voicesLoaded=false;

function loadVoices(){
  let v = speechSynthesis.getVoices();
  if(!v.length) return;

  usVoice = v.find(x=>x.name.includes("Samantha")) ||
            v.find(x=>x.lang==="en-US") ||
            v.find(x=>x.lang.includes("en"));

  voicesLoaded=true;
}
speechSynthesis.onvoiceschanged=loadVoices;
setTimeout(loadVoices,300);

// ===== DATA =====
const dialogs = [

[
["A","Hey, do you have a minute to talk about the new project?"],
["B","Sure, what’s up?"],
["A","We might need to adjust the timeline."],
["B","Is there any specific reason?"],
["A","Yeah, the client requested some additional features."],
["B","I see. Let’s review the schedule together later."],
["A","Sounds good. I’ll prepare the updated plan."]
],

[
["A","Have you finished the report for the meeting?"],
["B","I’m almost done. Just polishing the last section."],
["A","Great. Can you send it to me before noon?"],
["B","Sure, I’ll send it within the next hour."],
["A","Perfect, I’ll review it before the meeting."],
["B","Thanks, let me know if anything needs to be changed."]
],

[
["A","I think we need to improve this workflow."],
["B","I agree. It’s taking too much time right now."],
["A","Do you have any suggestions?"],
["B","Maybe we can automate part of the process."],
["A","That’s a good idea."],
["B","Let’s bring this up in the next team meeting."],
["A","Alright, I’ll add it to the agenda."]
],

[
["A","Can you help me with this issue? I’m stuck."],
["B","Sure, what seems to be the problem?"],
["A","I can’t get the system to respond properly."],
["B","Did you check the latest update?"],
["A","Not yet."],
["B","Try that first. It might solve the issue."],
["A","Okay, I’ll give it a try. Thanks."]
],

[
["A","Are you available for a meeting tomorrow morning?"],
["B","Let me check my schedule."],
["A","We need to discuss the client feedback."],
["B","I’m free at 10 a.m."],
["A","Perfect, I’ll set up the meeting."],
["B","Sounds good. See you then."]
]

];

// ===== RENDER =====
const container=document.getElementById("container");
let allLines=[];

dialogs.forEach((d,di)=>{
  let box=document.createElement("div");
  box.className="dialog";

  d.forEach((l,li)=>{
    let el=document.createElement("div");
    el.className="line "+l[0];
    el.id=`d${di}_${li}`;
    el.innerText=l[0]+": "+l[1];
    box.appendChild(el);

    allLines.push({id:el.id,text:l[1],speaker:l[0]});
  });

  container.appendChild(box);
});

// ===== SPEAK =====
function speakAsync(text,speaker){
  return new Promise(res=>{
    let u=new SpeechSynthesisUtterance(text);
    u.lang="en-US";
    u.rate=rate();
    u.pitch=speaker==="A"?1.2:0.8;
    if(usVoice) u.voice=usVoice;
    u.onend=()=>setTimeout(res,400);
    speechSynthesis.speak(u);
  });
}

// ===== CONTROL =====
let i=0,playing=false,paused=false;

async function play(){
  stop(); playing=true; i=0;
  while(i<allLines.length && playing){
    while(paused) await new Promise(r=>setTimeout(r,200));
    highlight(i);
    await speakAsync(allLines[i].text,allLines[i].speaker);
    i++;
  }
  clear();
}

function pause(){ paused=true; speechSynthesis.pause(); }
function resume(){ paused=false; speechSynthesis.resume(); }
function stop(){ playing=false; paused=false; speechSynthesis.cancel(); clear(); }

// ===== UI =====
function highlight(i){
  clear();
  let el=document.getElementById(allLines[i].id);
  el.classList.add("active");
  el.scrollIntoView({behavior:"smooth",block:"center"});
}
function clear(){
  document.querySelectorAll(".line").forEach(x=>x.classList.remove("active"));
}

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Routine Vocabulary</title>
<style>
  body { font-family: Arial; padding: 20px; }
  table { border-collapse: collapse; width: 100%; margin-top:20px;}
  th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
  th { background-color: #f4f4f4; }
  button { padding: 6px 12px; margin-right: 5px; cursor:pointer; }
  .controls { margin-bottom: 15px; }
  .ipa { color: #555; font-style: italic; }
  .highlight { background-color: #ffeaa7; }
  select { padding: 5px; margin-left: 10px; }
</style>
</head>

<body>

<h2>Daily Routine Vocabulary</h2>

<div class="controls">
  <button onclick="playAll()">▶ Play All</button>
  <button onclick="pauseAll()">⏸ Pause</button>
  <button onclick="resumeAll()">▶ Resume</button>
  <button onclick="stopAll()">⏹ Stop</button>

  Repeat:
  <select id="repeatCount">
    <option value="1">1</option>
    <option value="2" selected>2</option>
    <option value="3">3</option>
  </select>

  Speed:
  <select id="speedRate">
    <option value="0.3">Slow 0.3</option>
    <option value="0.5">Slow 0.5</option>
    <option value="0.8">Slow 0.8</option>
    <option value="1.0" selected>Normal 1.0</option>
    <option value="1.1">Fast 1.1</option>
  </select>
</div>

<table>
  <thead>
    <tr>
      <th>No</th>
      <th>Word</th>
      <th>IPA</th>
      <th>Meaning</th>
      <th>Example</th>
      <th>🔊</th>
    </tr>
  </thead>
  <tbody id="vocabTable"></tbody>
</table>

<hr>

<h2>🧠 Practice Speaking (Phản xạ)</h2>

<div style="margin-top:20px;">
  <button onclick="startPractice()">▶ Start Practice</button>
  <button onclick="showAnswer()">👁 Show Answer</button>
</div>

<div id="question" style="margin-top:20px; font-size:20px; font-weight:bold;"></div>
<div id="answer" style="margin-top:10px; color:green; display:none;"></div>

<script>
// ======================= VOCAB DATA =======================
const vocabList = [
  {word: "wake up", ipa: "/weɪk ʌp/", meaning: "thức dậy", example: "I wake up at 6 a.m."},
  {word: "get up", ipa: "/ɡet ʌp/", meaning: "ra khỏi giường", example: "I usually get up quickly every morning."},
  {word: "brush my teeth", ipa: "/brʌʃ maɪ tiːθ/", meaning: "đánh răng", example: "I brush my teeth after waking up every day."},
  {word: "wash my face", ipa: "/wɑːʃ maɪ feɪs/", meaning: "rửa mặt", example: "I wash my face after waking up."},
  {word: "take a shower", ipa: "/teɪk ə ˈʃaʊər/", meaning: "tắm", example: "I take a shower after work everyday."},
  {word: "have breakfast", ipa: "/hæv ˈbrekfəst/", meaning: "ăn sáng", example: "I have breakfast at around 7 A.M every morning."},
  {word: "drink coffee", ipa: "/drɪŋk ˈkɔːfi/", meaning: "uống cà phê", example: "I drink coffee every morning."},
  {word: "go to work", ipa: "/ɡoʊ tuː wɜːrk/", meaning: "đi làm", example: "I go to work at around 8 A.M by car."},
  {word: "start work", ipa: "/stɑːrt wɜːrk/", meaning: "bắt đầu làm việc", example: "I start work at 8:30 A.M."},
  {word: "check emails", ipa: "/tʃek ˈiːmeɪlz/", meaning: "kiểm tra email", example: "I check emails in the morning."},
  {word: "have lunch", ipa: "/hæv lʌntʃ/", meaning: "ăn trưa", example: "I have lunch at noon in company."},
  {word: "take a break", ipa: "/teɪk ə breɪk/", meaning: "nghỉ giải lao", example: "I take a break at around 3 P.M."},
  {word: "finish work", ipa: "/ˈfɪnɪʃ wɜːrk/", meaning: "tan làm", example: "I finish work at 5:30 P.M."},
  {word: "go home", ipa: "/ɡoʊ hoʊm/", meaning: "về nhà", example: "I always go home after work."},
  {word: "cook dinner", ipa: "/kʊk ˈdɪnər/", meaning: "nấu ăn tối", example: "I cook dinner in the evening."},
  {word: "have dinner", ipa: "/hæv ˈdɪnər/", meaning: "ăn tối", example: "I have dinner at around 7 P.M."},
  {word: "watch TV", ipa: "/wɑːtʃ ˌtiːˈviː/", meaning: "xem TV", example: "I watch TV after dinner."},
  {word: "use my phone", ipa: "/juːz maɪ foʊn/", meaning: "dùng điện thoại", example: "I use my phone before bed."},
  {word: "read a book", ipa: "/riːd ə bʊk/", meaning: "đọc sách", example: "I read a book at night."},
  {word: "go to bed", ipa: "/ɡoʊ tuː bed/", meaning: "đi ngủ", example: "I go to bed at around 11 P.M."}
];

// ======================= TABLE =======================
const table = document.getElementById("vocabTable");
vocabList.forEach((item, idx) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${idx+1}</td>
    <td>${item.word}</td>
    <td class="ipa">${item.ipa}</td>
    <td>${item.meaning}</td>  
    <td>${item.example}</td>
    <td><button onclick="speakOnce('${item.example}')">Play</button></td>
  `;
  table.appendChild(tr);
});

// ======================= SPEAK =======================
function getRate() {
  return parseFloat(document.getElementById("speedRate").value);
}

function speakOnce(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = getRate();
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ======================= PRACTICE SETS (FIX CỐT LÕI) =======================

const practiceSets = [
  {
    question: "What do you do in the morning?",
    answers: [0,1,2,3,4,5,6]
  },
  {
    question: "What do you do during the day?",
    answers: [7,8,9,10,11]
  },
  {
    question: "What do you do after work?",
    answers: [12,13,14,15]
  },
  {
    question: "What do you do at night?",
    answers: [16,17,18,19]
  }
];

let currentPractice = null;
let currentAnswerText = "";

// ======================= START PRACTICE =======================
function startPractice() {
  document.getElementById("answer").style.display = "none";

  // chọn practice set
  currentPractice = practiceSets[
    Math.floor(Math.random() * practiceSets.length)
  ];

  // chọn answer hợp lệ
  const answerIndex =
    currentPractice.answers[
      Math.floor(Math.random() * currentPractice.answers.length)
    ];

  currentAnswerText = vocabList[answerIndex].example;

  document.getElementById("question").innerText = currentPractice.question;
  document.getElementById("answer").innerText = currentAnswerText;

  speakOnce(currentPractice.question);
}

// ======================= SHOW ANSWER =======================
function showAnswer() {
  const answer = document.getElementById("answer");
  answer.style.display = "block";
  speakOnce(currentAnswerText);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 3 - Role Play PRO</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f5f6fa;
  padding:20px;
}
.container {
  max-width:800px;
  margin:auto;
}
.card {
  background:white;
  border-radius:15px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.lineA {
  color:#0984e3;
  font-weight:bold;
  margin:10px 0;
}
.lineB {
  color:green;
  margin:10px 0;
}
.controls button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#0984e3;
  color:white;
  cursor:pointer;
}
.countdown {
  font-size:40px;
  color:red;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h2>🎭 Lesson 3: Role Play PRO</h2>

<div class="card" id="chatBox"></div>
<div id="countdown" class="countdown"></div>

<div class="controls">
  <button onclick="start()">▶ Start</button>
  <button onclick="next()">➡ Next</button>
  <button onclick="showAnswer()">👁 Show</button>
  <button onclick="toggleAuto()">🤖 Auto: OFF</button>

  <br><br>

  <!-- 🔥 SPEED SLIDER -->
  Speed:
  <input type="range" id="speedSlider" min="0.3" max="1.5" step="0.1" value="1">
  <span id="speedValue">1.0</span>

  

  Thinking:
  <select id="delayQ">
    <option value="3000">3s</option>
    <option value="4000">4s</option>
    <option value="5000">5s</option>
    <option value="6000">6s</option>
  </select>

  After Answer:
  <select id="delayA">
    <option value="3000">3s</option>
    <option value="4000">4s</option>
    <option value="5000">5s</option>
    <option value="6000">6s</option>
  </select>
</div>

</div>

<script>

// ===== DATA =====
const pairs = [
  { q:"What time do you wake up?", a:"I wake up at around 6 A.M." },
  { q:"What do you do in the morning?", a:"I brush my teeth, wash my face and then have breakfast with my children at around 7:15 A.M." },
  { q:"Do you drink coffee?", a:"Yes, I do. I always drink coffee every morning." },
  { q:"What time do you go to work?", a:"I go to work at around 8 A.M." },
  { q:"What do you do after work?", a:"I go home, take a shower and then have dinner with my family at around 7:00 P.M." },
  { q:"What do you do at night?", a:"I watch TV, relax and go to bed at around 11 P.M." },
  { q:"Do you take a shower in the morning?", a:"No, I don't. I always take a shower before dinner every night." },
  { q:"What do you eat for breakfast?", a:"I usually eat rice with soup, but sometimes I eat bread and eggs." },
  { q:"Do you check your phone in the morning?", a:"Yes, I check my phone every morning." },
  { q:"How do you go to work?", a:"I go to work by car." },
  { q:"Do you like your job?", a:"Yes, I like my job." },
  { q:"What do you do at work?", a:"I work on a computer." },
  { q:"Do you have lunch at work?", a:"Yes, I have lunch at work." },
  { q:"What time do you have lunch?", a:"I usually have lunch at 12 p.m." },
  { q:"Do you take a break in the afternoon?", a:"Yes, I do. I take a break around 3 p.m. every day." },
  { q:"What time do you finish work?", a:"I finish work at 5:30 p.m." },
  { q:"Do you feel tired after work?", a:"Yes, sometimes I feel tired." },
  { q:"What do you do in the evening?", a:"I watch TV, cook dinner and relax." },
  { q:"Do you read books at night?", a:"Yes, sometimes I read." },
  { q:"What time do you go to bed?", a:"I go to bed at around 11 p.m." }
];

// ===== GLOBAL =====
let current = 0;
let autoMode = false;
let autoTimer = null;
let currentAnswer = "";
let currentAnswerDiv = null;

// ===== SPEED =====
const speedSlider = document.getElementById("speedSlider");
const speedValue = document.getElementById("speedValue");

speedSlider.oninput = () => {
  speedValue.innerText = speedSlider.value;
};

function getRate(){
  return parseFloat(speedSlider.value);
}

// ===== SPEAK =====
function speak(text, onEnd = null) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = getRate(); // 🔥 áp dụng speed

  if (onEnd) u.onend = onEnd;

  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ===== START =====
function start() {
  current = 0;
  document.getElementById("chatBox").innerHTML = "";
  load();
}

// ===== LOAD =====
function load() {
  clearTimeout(autoTimer);

  const item = pairs[current];
  currentAnswer = item.a;

  const qDiv = document.createElement("div");
  qDiv.className = "lineA";
  qDiv.innerText = "A: " + item.q;

  const aDiv = document.createElement("div");
  aDiv.className = "lineB";
  aDiv.innerText = "👉 YOU: ???";

  currentAnswerDiv = aDiv;

  const box = document.getElementById("chatBox");
  box.appendChild(qDiv);
  box.appendChild(aDiv);

  speak(item.q, () => {
    if (autoMode) runAuto();
  });
}

// ===== COUNTDOWN =====
function startCountdown(ms, callback) {
  let time = ms / 1000;
  const el = document.getElementById("countdown");
  el.innerText = time;

  const interval = setInterval(() => {
    time--;
    el.innerText = time;

    if (time <= 0) {
      clearInterval(interval);
      el.innerText = "";
      callback();
    }
  }, 1000);
}

// ===== AUTO =====
function runAuto() {
  const delayQ = parseInt(document.getElementById("delayQ").value);
  const delayA = parseInt(document.getElementById("delayA").value);

  startCountdown(delayQ, () => {
    showAnswerAuto(delayA);
  });
}

function showAnswerAuto(delayA) {
  currentAnswerDiv.innerText = "YOU: " + currentAnswer;

  speak(currentAnswer, () => {
    startCountdown(delayA, () => {
      next();
    });
  });
}

// ===== MANUAL =====
function showAnswer() {
  if (!currentAnswerDiv) return;
  currentAnswerDiv.innerText = "YOU: " + currentAnswer;
  speak(currentAnswer);
}

// ===== NEXT =====
function next() {
  current++;
  if (current >= pairs.length) {
    alert("✅ Lesson Completed!");
    return;
  }
  load();
}

// ===== AUTO TOGGLE =====
function toggleAuto() {
  autoMode = !autoMode;
  const btn = document.querySelector("button[onclick='toggleAuto()']");
  btn.innerText = autoMode ? "🤖 Auto: ON" : "🤖 Auto: OFF";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 3 - Role Play PRO</title>

<style>
body { font-family: Arial; background:#f5f6fa; padding:20px; }
.container { max-width:800px; margin:auto; }
.card {
  background:white;
  border-radius:15px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.lineA { color:#0984e3; font-weight:bold; margin:10px 0; }
.lineB { color:green; margin:10px 0; }
.highlight { background:#ffeaa7; padding:5px; border-radius:6px; }
.controls button {
  margin:5px; padding:10px 15px;
  border:none; border-radius:8px;
  background:#0984e3; color:white;
}
.countdown {
  font-size:40px; color:red;
  font-weight:bold; margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h2>🎭 Lesson 3: Role Play</h2>

<div class="card" id="chatBox"></div>
<div id="countdown" class="countdown"></div>

<div class="controls">
  <button onclick="start()">▶ Start</button>
  <button onclick="next()">➡ Next</button>
  <button onclick="showAnswer()">👁 Show</button>
  <button onclick="toggleAuto()">🤖 Auto: OFF</button>

  <br><br>

  <!-- 🔥 NEW RANGE SELECT -->
  From:
  <select id="startSelect"></select>
  To:
  <select id="endSelect"></select>

  <br><br>

  Speed:
  <input type="range" id="speedSlider" min="0.3" max="1.5" step="0.1" value="0.5">
  <span id="speedValue">1.0</span>

  Voice:
  <select id="voiceSelect"></select>

  <br><br>

  Thinking:
  <select id="delayQ">
    <option value="3000">3s</option>
    <option value="4000">4s</option>
    <option value="5000">5s</option>
    <option value="6000">6s</option>
  </select>

  After Answer:
  <select id="delayA">
    <option value="3000">3s</option>
    <option value="4000">4s</option>
    <option value="5000">5s</option>
    <option value="6000">6s</option>
  </select>
</div>

</div>

<script>

// ===== DATA =====
const pairs = [
  {q:"What time do you wake up?", a:"I wake up at 6 a.m."},
  {q:"How do you usually get up in the morning?", a:"I usually get up quickly every morning."},
  {q:"When do you brush your teeth?", a:"I brush my teeth after waking up every day."},
  {q:"When do you wash your face?", a:"I wash my face after waking up."},
  {q:"When do you take a shower?", a:"I take a shower after work everyday."},
  {q:"What time do you have breakfast?", a:"I have breakfast at around 7 A.M every morning."},
  {q:"Do you drink coffee?", a:"I drink coffee every morning."},
  {q:"What time do you go to work?", a:"I go to work at around 8 A.M by car."},
  {q:"What time do you start work?", a:"I start work at 8:30 A.M."},
  {q:"When do you check emails?", a:"I check emails in the morning."},
  {q:"What time do you have lunch?", a:"I have lunch at noon in company."},
  {q:"When do you take a break?", a:"I take a break at around 3 P.M."},
  {q:"What time do you finish work?", a:"I finish work at 5:30 P.M."},
  {q:"What do you do after work?", a:"I always go home after work."},
  {q:"When do you cook dinner?", a:"I cook dinner in the evening."},
  {q:"What time do you have dinner?", a:"I have dinner at around 7 P.M."},
  {q:"What do you do after dinner?", a:"I watch TV after dinner."},
  {q:"When do you use your phone?", a:"I use my phone before bed."},
  {q:"When do you read a book?", a:"I read a book at night."},
  {q:"What time do you go to bed?", a:"I go to bed at around 11 P.M."},

  {q:"When do you make the bed?", a:"I make the bed every morning."},
  {q:"When do you get dressed?", a:"I get dressed before breakfast."},
  {q:"What time do you leave the house?", a:"I leave the house at 7:30 A.M."},
  {q:"How do you go to work?", a:"I catch the bus to work."},
  {q:"How do you go to work every day?", a:"I drive to work every day."},
  {q:"What time do you arrive at work?", a:"I arrive at work at 8 A.M."},
  {q:"What do you do when you start work?", a:"I turn on the computer when I start work."},
  {q:"When do you attend a meeting?", a:"I attend a meeting every Monday."},
  {q:"How often do you write a report?", a:"I write a report every week."},
  {q:"When do you talk to colleagues?", a:"I talk to colleagues during breaks."},
  {q:"Where do you answer calls?", a:"I answer calls in the office."},
  {q:"How often do you send emails?", a:"I send emails every day."},
  {q:"When do you have a meeting?", a:"I have a meeting in the afternoon."},
  {q:"What do you do during meetings?", a:"I take notes during meetings."},
  {q:"When do you eat snacks?", a:"I eat snacks in the afternoon."},
  {q:"When do you go shopping?", a:"I go shopping on weekends."},
  {q:"When do you buy groceries?", a:"I buy groceries after work."},
  {q:"When do you clean the house?", a:"I clean the house on Sunday."},
  {q:"When do you do the laundry?", a:"I do the laundry every weekend."},
  {q:"When do you wash the dishes?", a:"I wash the dishes after dinner."},
  {q:"When do you take out the trash?", a:"I take out the trash every evening."},
  {q:"How often do you exercise?", a:"I exercise three times a week."},
  {q:"When do you go for a walk?", a:"I go for a walk after dinner."},
  {q:"When do you listen to music?", a:"I listen to music before bed."},
  {q:"What do you do on your phone?", a:"I play games on my phone."},
  {q:"How often do you study English?", a:"I study English every day."},
  {q:"When do you review lessons?", a:"I review lessons at night."},
  {q:"When do you plan the day?", a:"I plan the day in the morning."},
  {q:"When do you set an alarm?", a:"I set an alarm before going to bed."},
  {q:"How do you fall asleep at night?", a:"I fall asleep quickly at night."}
];

// ===== GLOBAL =====
let current = 0;
let startIdx = 0;
let endIdx = pairs.length - 1;

let autoMode = false;
let currentAnswer = "";
let currentAnswerDiv = null;

// ===== INIT SELECT =====
const startSelect = document.getElementById("startSelect");
const endSelect = document.getElementById("endSelect");

pairs.forEach((p,i)=>{
  startSelect.add(new Option((i+1)+". "+p.q, i));
  endSelect.add(new Option((i+1)+". "+p.q, i));
});

// ===== SPEED =====
speedSlider.oninput = () => speedValue.innerText = speedSlider.value;
function getRate(){ return parseFloat(speedSlider.value); }

// ===== VOICE =====
let voices = [];
function loadVoices(){
  const all = speechSynthesis.getVoices();
  voices = all.filter(v => v.lang==="en-US");
  voiceSelect.innerHTML="";
  voices.forEach((v,i)=>{
    const opt=document.createElement("option");
    opt.value=i;
    opt.text="🇺🇸 "+v.name;
    voiceSelect.appendChild(opt);
  });
}
speechSynthesis.onvoiceschanged=loadVoices;
setTimeout(loadVoices,500);

// ===== SPEAK =====
function speak(text,onEnd=null){
  const u=new SpeechSynthesisUtterance(text);
  u.rate=getRate();
  if(voices[voiceSelect.value]) u.voice=voices[voiceSelect.value];
  if(onEnd) u.onend=onEnd;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ===== START =====
function start(){
  startIdx = parseInt(startSelect.value);
  endIdx = parseInt(endSelect.value);

  if(startIdx > endIdx){
    alert("Start must be before End");
    return;
  }

  current = startIdx;
  chatBox.innerHTML="";
  load();
}

// ===== LOAD =====
function load(){
  const item=pairs[current];
  currentAnswer=item.a;

  const q=document.createElement("div");
  q.className="lineA highlight";
  q.innerText="A: "+item.q;

  const a=document.createElement("div");
  a.className="lineB";
  a.innerText="👉 YOU: ???";

  currentAnswerDiv=a;

  chatBox.appendChild(q);
  chatBox.appendChild(a);

  speak(item.q,()=>{ if(autoMode) runAuto(); });
}

// ===== COUNTDOWN =====
function startCountdown(ms,cb){
  let t=ms/1000;
  countdown.innerText=t;
  const i=setInterval(()=>{
    t--;
    countdown.innerText=t;
    if(t<=0){ clearInterval(i); countdown.innerText=""; cb(); }
  },1000);
}

// ===== AUTO =====
function runAuto(){
  const dQ=+delayQ.value;
  const dA=+delayA.value;

  startCountdown(dQ,()=>{
    currentAnswerDiv.innerText="YOU: "+currentAnswer;
    speak(currentAnswer,()=>{
      startCountdown(dA,next);
    });
  });
}

// ===== MANUAL =====
function showAnswer(){
  currentAnswerDiv.innerText="YOU: "+currentAnswer;
  speak(currentAnswer);
}

// ===== NEXT =====
function next(){
  current++;
//  if(current > endIdx){
//    alert("Done");
//    return;
//  }
  load();
}

// ===== TOGGLE =====
function toggleAuto(){
  autoMode=!autoMode;
  event.target.innerText=autoMode?"🤖 Auto: ON":"🤖 Auto: OFF";
}

</script>

</body>
</html>

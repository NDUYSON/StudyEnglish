<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Appointment Dialog Practice</title>

<style>
body { font-family: Arial; padding:20px; }

h2 { text-align:center }

.controls { margin-bottom:15px }

button { padding:8px 12px; margin-right:5px }

.dialog {
  margin-bottom:20px;
  padding:10px;
  border-radius:10px;
  background:#f5f6fa;
}

.line {
  padding:6px;
  border-radius:6px;
}

.A { color:#0984e3; }
.B { color:#d63031; }

.active {
  background:#ffeaa7;
  transform:scale(1.02);
  transition:0.2s;
}
</style>
</head>

<body>

<h2>🗣️ Daily Appointment Dialog (Shadowing)</h2>

<div class="controls">
  <button onclick="play()">▶ Play</button>
  <button onclick="pause()">⏸ Pause</button>
  <button onclick="resume()">▶ Resume</button>
  <button onclick="stop()">⏹ Stop</button>

  Speed:
  <input type="range" id="speed" min="0.5" max="1.2" step="0.1" value="0.7">
  <span id="speedVal">0.7</span>
</div>

<div id="container"></div>

<script>

// ===== SPEED =====
const speedSlider = document.getElementById("speed");
const speedVal = document.getElementById("speedVal");

speedSlider.oninput = ()=> speedVal.innerText = speedSlider.value;

function rate(){ return parseFloat(speedSlider.value); }

// ===== 🔥 VOICE FIX =====
let usVoice = null;

function loadVoices(){
  const voices = speechSynthesis.getVoices();

  usVoice = voices.find(v => v.name.includes("Google US English"))
          || voices.find(v => v.lang === "en-US")
          || voices.find(v => v.lang.includes("en"));

  console.log("US Voice:", usVoice);
}

speechSynthesis.onvoiceschanged = loadVoices;


// ===== DIALOG DATA =====
const dialogs = [

[
["A","Hey, are you free this weekend?"],
["B","Yes, I am. What’s up?"],
["A","Let’s go for coffee."],
["B","Sounds good!"]
],

[
["A","Do you want to have lunch tomorrow?"],
["B","Sure, what time?"],
["A","Around 12?"],
["B","Perfect."]
],

[
["A","Can we meet tonight?"],
["B","I’m a bit busy."],
["A","How about tomorrow then?"],
["B","That works."]
],

[
["A","Are you available this evening?"],
["B","Yes, I am."],
["A","Let’s watch a movie."],
["B","Great idea."]
],

[
["A","Do you want to study together?"],
["B","Yes, let’s do it."],
["A","At the library?"],
["B","See you there."]
],

[
["A","Can you meet me after work?"],
["B","Sure."],
["A","Let’s grab dinner."],
["B","I’m hungry already!"]
],

[
["A","Are you free on Friday?"],
["B","Yes."],
["A","Let’s hang out."],
["B","Cool."]
],

[
["A","Do you want to go shopping?"],
["B","Sure."],
["A","This afternoon?"],
["B","Let’s go."]
],

[
["A","Can we meet earlier?"],
["B","How early?"],
["A","Around 9?"],
["B","Okay."]
],

[
["A","Are you busy right now?"],
["B","Not really."],
["A","Let’s talk for a bit."],
["B","Sure."]
]

];

// ===== RENDER =====
const container = document.getElementById("container");

let allLines = [];

dialogs.forEach((dialog, dIndex)=>{
  const div = document.createElement("div");
  div.className = "dialog";

  dialog.forEach((line, lIndex)=>{
    const p = document.createElement("div");
    p.className = "line " + line[0];
    p.id = `d${dIndex}_l${lIndex}`;
    p.innerText = `${line[0]}: ${line[1]}`;

    div.appendChild(p);

    allLines.push({
      id: p.id,
      speaker: line[0],
      text: line[1]
    });
  });

  container.appendChild(div);
});

// ===== SPEECH =====
const synth = window.speechSynthesis;

function speakAsync(text, speaker){
  return new Promise(resolve=>{
    const u = new SpeechSynthesisUtterance(text);

    u.lang = "en-US";
    u.rate = rate();

    // phân biệt giọng A/B
    u.pitch = speaker === "A" ? 1.2 : 0.8;

    // ✅ ép giọng US
    if(usVoice){
      u.voice = usVoice;
    }

    u.onend = ()=> setTimeout(resolve, 800);

    synth.speak(u);
  });
}

// ===== CONTROL =====
let index = 0;
let isPlaying = false;
let isPaused = false;

async function play(){
  stop();
  isPlaying = true;
  index = 0;

  while(index < allLines.length && isPlaying){

    while(isPaused){
      await new Promise(r=>setTimeout(r,200));
    }

    highlight(index);

    let line = allLines[index];
    await speakAsync(line.text, line.speaker);

    index++;
  }

  clearHighlight();
}

function pause(){
  isPaused = true;
  synth.pause();
}

function resume(){
  isPaused = false;
  synth.resume();
}

function stop(){
  isPlaying = false;
  isPaused = false;
  synth.cancel();
  clearHighlight();
}

// ===== UI =====
function highlight(i){
  clearHighlight();

  const el = document.getElementById(allLines[i].id);
  if(!el) return;

  el.classList.add("active");

  el.scrollIntoView({
    behavior:"smooth",
    block:"center"
  });
}

function clearHighlight(){
  document.querySelectorAll(".line").forEach(el=>{
    el.classList.remove("active");
  });
}

</script>

</body>
</html>

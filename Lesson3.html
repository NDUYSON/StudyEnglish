<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 3 - Role Play PRO</title>

<style>
body { font-family: Arial; background:#f5f6fa; padding:20px; }
.container { max-width:800px; margin:auto; }
.card {
  background:white;
  border-radius:15px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.lineA { color:#0984e3; font-weight:bold; margin:10px 0; }
.lineB { color:green; margin:10px 0; }
.highlight { background:#ffeaa7; padding:5px; border-radius:6px; }
.controls button {
  margin:5px; padding:10px 15px;
  border:none; border-radius:8px;
  background:#0984e3; color:white;
}
.countdown {
  font-size:40px; color:red;
  font-weight:bold; margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h2>🎭 Lesson 3: Role Play PRO</h2>

<div class="card" id="chatBox"></div>
<div id="countdown" class="countdown"></div>

<div class="controls">
  <button onclick="start()">▶ Start</button>
  <button onclick="next()">➡ Next</button>
  <button onclick="showAnswer()">👁 Show</button>
  <button onclick="toggleAuto()">🤖 Auto: OFF</button>

  <br><br>

  Speed:
  <input type="range" id="speedSlider" min="0.3" max="1.5" step="0.1" value="0.5">
  <span id="speedValue">1.0</span>

  Voice:
  <select id="voiceSelect"></select>

  <br><br>

  Thinking:
  <select id="delayQ">
    <option value="3000">3s</option>
    <option value="4000">4s</option>
    <option value="5000">5s</option>
    <option value="6000">6s</option>
  </select>

  After Answer:
  <select id="delayA">
    <option value="3000">3s</option>
    <option value="4000">4s</option>
    <option value="5000">5s</option>
    <option value="6000">6s</option>
  </select>
</div>

</div>

<script>

// ===== DATA =====
const pairs = [ /* giữ nguyên database của bạn */ 
  { q:"What time do you wake up?", a:"I wake up at around 6 A.M." },
  { q:"What do you do in the morning?", a:"I brush my teeth, wash my face and then have breakfast with my children at around 7:15 A.M." },
  { q:"Do you drink coffee?", a:"Yes, I do. I always drink coffee every morning." },
  { q:"What time do you go to work?", a:"I go to work at around 8 A.M." },
  { q:"What do you do after work?", a:"I go home, take a shower and then have dinner with my family at around 7:00 P.M." },
  { q:"What do you do at night?", a:"I watch TV, relax and go to bed at around 11 P.M." },
  { q:"Do you take a shower in the morning?", a:"No, I don't. I always take a shower before dinner every night." },
  { q:"What do you eat for breakfast?", a:"I usually eat rice with soup, but sometimes I eat bread and eggs." },
  { q:"Do you check your phone in the morning?", a:"Yes, I check my phone every morning." },
  { q:"How do you go to work?", a:"I go to work by car." },
  { q:"Do you like your job?", a:"Yes, I like my job." },
  { q:"What do you do at work?", a:"I work on a computer." },
  { q:"Do you have lunch at work?", a:"Yes, I have lunch at work." },
  { q:"What time do you have lunch?", a:"I usually have lunch at 12 p.m." },
  { q:"Do you take a break in the afternoon?", a:"Yes, I do. I take a break around 3 p.m. every day." },
  { q:"What time do you finish work?", a:"I finish work at 5:30 p.m." },
  { q:"Do you feel tired after work?", a:"Yes, sometimes I feel tired." },
  { q:"What do you do in the evening?", a:"I watch TV, cook dinner and relax." },
  { q:"Do you read books at night?", a:"Yes, sometimes I read." },
  { q:"What time do you go to bed?", a:"I go to bed at around 11 p.m." }
];

// ===== GLOBAL =====
let current = 0;
let autoMode = false;
let currentAnswer = "";
let currentAnswerDiv = null;

// ===== SPEED =====
speedSlider.oninput = () => speedValue.innerText = speedSlider.value;
function getRate(){ return parseFloat(speedSlider.value); }

// ===== VOICE =====
let voices = [];
function loadVoices(){
  const all = speechSynthesis.getVoices();
  voices = all.filter(v => v.lang==="en-US");
  voiceSelect.innerHTML="";
  voices.forEach((v,i)=>{
    const opt=document.createElement("option");
    opt.value=i;
    opt.text=(v.lang==="en-US"?"🇺🇸":"🇬🇧")+" "+v.name;
    voiceSelect.appendChild(opt);
  });
}
speechSynthesis.onvoiceschanged=loadVoices;
setTimeout(loadVoices,500);

// ===== SPEAK =====
function speak(text,onEnd=null){
  const u=new SpeechSynthesisUtterance(text);
  u.rate=getRate();
  if(voices[voiceSelect.value]) u.voice=voices[voiceSelect.value];
  if(onEnd) u.onend=onEnd;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ===== START =====
function start(){
  current=0;
  chatBox.innerHTML="";
  load();
}

// ===== LOAD =====
function load(){
  const item=pairs[current];
  currentAnswer=item.a;

  const q=document.createElement("div");
  q.className="lineA highlight";
  q.innerText="A: "+item.q;

  const a=document.createElement("div");
  a.className="lineB";
  a.innerText="👉 YOU: ???";

  currentAnswerDiv=a;

  chatBox.appendChild(q);
  chatBox.appendChild(a);

  speak(item.q,()=>{ if(autoMode) runAuto(); });
}

// ===== COUNTDOWN =====
function startCountdown(ms,cb){
  let t=ms/1000;
  countdown.innerText=t;
  const i=setInterval(()=>{
    t--;
    countdown.innerText=t;
    if(t<=0){ clearInterval(i); countdown.innerText=""; cb(); }
  },1000);
}

// ===== AUTO =====
function runAuto(){
  const dQ=+delayQ.value;
  const dA=+delayA.value;

  startCountdown(dQ,()=>{
    currentAnswerDiv.innerText="YOU: "+currentAnswer;
    speak(currentAnswer,()=>{
      startCountdown(dA,next);
    });
  });
}

// ===== MANUAL =====
function showAnswer(){
  currentAnswerDiv.innerText="YOU: "+currentAnswer;
  speak(currentAnswer);
}

// ===== NEXT =====
function next(){
  current++;
  if(current>=pairs.length){ alert("Done"); return; }
  load();
}

// ===== TOGGLE =====
function toggleAuto(){
  autoMode=!autoMode;
  event.target.innerText=autoMode?"🤖 Auto: ON":"🤖 Auto: OFF";
}

</script>

</body>
</html>
